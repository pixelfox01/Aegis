<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="interface.css" />
</head>
<body class="theme-dark">

  <!-- Background layers -->
  <div class="grain"></div>
  <div class="orb"></div>

  <!-- Nav -->
  <header class="nav">
    <span class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2C6 2 3 7 3 12c0 3 1.5 5.5 4 7l5-9 5 9c2.5-1.5 4-4 4-7 0-5-3-10-9-10z"/>
      </svg>
      Raven
    </span>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
      <span class="toggle-icon icon-sun">☀️</span>
      <span class="toggle-icon icon-moon">🌙</span>
      <span class="toggle-knob"></span>
    </button>
  </header>

  <!-- Site row: domain + score ring -->
  <div class="site-row">
    <div class="site-info">
      <div class="favicon-wrap">
        <img class="favicon-img" id="faviconImg" alt="" />
      </div>
      <div class="site-meta">
        <span class="site-domain" id="siteDomain">example.com</span>
        <span class="site-sub">Active tab</span>
      </div>
    </div>

    <div class="score-wrap">
      <svg class="score-svg" viewBox="0 0 64 64" id="scoreRing">
        <circle class="ring-track" cx="32" cy="32" r="26" />
        <circle class="ring-fill" id="ringFill" cx="32" cy="32" r="26"
          stroke-dasharray="163.36"
          stroke-dashoffset="163.36" />
      </svg>
      <div class="score-center">
        <div class="score-readout">
          <span class="score-num" id="scoreNum">—</span><span class="score-pct" id="scorePct">%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Breakdown -->
  <section class="breakdown">
    <p class="section-eyebrow">Values alignment</p>

    <div class="breakdown-row" id="metricCookies">
      <span class="dim-label">Unnecessary cookies</span>
      <span class="dot dot-loading"></span>
    </div>

    <div class="breakdown-row" id="metricTrackers">
      <span class="dim-label">Trackers</span>
      <span class="dot dot-loading"></span>
    </div>

    <div class="breakdown-row" id="metricServices">
      <span class="dim-label">Browser permissions</span>
      <span class="dot dot-loading"></span>
    </div>

    <div class="breakdown-row" id="metricAccount">
      <span class="dim-label">Existing account</span>
      <span class="dot dot-muted"></span>
    </div>
  </section>

  <!-- Footer -->
  <footer class="popup-footer">
    <button class="footer-link">
      View full report <span class="arrow">→</span>
    </button>
    <button class="footer-icon" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </footer>

  <script type="module" src="interface.js"></script>
</body>
</html>
